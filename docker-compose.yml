services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medical_rag_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medical_rag}
      POSTGRES_USER: ${POSTGRES_USER:-medical_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
